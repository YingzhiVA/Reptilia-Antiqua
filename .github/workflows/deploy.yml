name: Deploy to GitHub Pages

# Release-gated: only pushing a version tag (e.g. v1, v2) deploys to Pages.
# Pushing to main does NOT publish — main can churn while the live version stays frozen.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let a newer release supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version (tag · short-sha) into index.html
        run: |
          VER="${GITHUB_REF_NAME:-dev}"
          SHA="$(git rev-parse --short HEAD)"
          echo "Stamping build: ${VER} · ${SHA}"
          sed -i "s|const BUILD=\"dev\";|const BUILD=\"${VER} \xc2\xb7 ${SHA}\";|" index.html
          grep -o 'const BUILD="[^"]*"' index.html

      - name: Stage site (index + img + audio + social image; art/ stays in repo only)
        run: |
          mkdir -p _site
          cp index.html _site/
          cp preview.jpg _site/
          cp -r img _site/img
          cp -r audio _site/audio

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
